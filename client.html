<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline Lab — My Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0D1113; --panel:#1A2124; --panel-hi:#212a2d;
    --paper:#ECE7DA; --paper-dim:rgba(236,231,218,0.55);
    --line:rgba(236,231,218,0.12);
    --amber:#D9A441; --amber-dim:rgba(217,164,65,0.55);
    --teal:#4FA3A0; --danger:#C4573A; --radius:2px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--ink); color:var(--paper); font-family:'Inter',sans-serif; min-height:100vh;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  #authScreen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .auth-box{width:100%; max-width:400px; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:36px 32px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--amber); margin-bottom:8px;}
  .auth-title{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.4rem; margin-bottom:8px;}
  .auth-sub{font-size:0.86rem; color:var(--paper-dim); margin-bottom:28px; line-height:1.5;}
  .field-label{display:block; font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--paper-dim); margin-bottom:8px;}
  .field-input{width:100%; background:var(--ink); border:1px solid var(--line); color:var(--paper); border-radius:var(--radius); padding:12px 14px; font-family:'Inter',sans-serif; font-size:0.94rem; margin-bottom:16px; outline:none; transition:border-color 0.15s;}
  .field-input:focus{border-color:var(--amber);}
  textarea.field-input{resize:vertical; min-height:80px;}
  .primary-btn{width:100%; background:var(--amber); color:var(--ink); border:none; border-radius:var(--radius); padding:13px; font-family:'IBM Plex Mono',monospace; font-size:0.86rem; font-weight:600; letter-spacing:0.04em; cursor:pointer; transition:background 0.15s;}
  .primary-btn:hover{background:#e5b458;}
  .primary-btn:disabled{opacity:0.5; cursor:not-allowed;}
  .link-btn{background:none; border:none; color:var(--teal); font-family:'IBM Plex Mono',monospace; font-size:0.76rem; cursor:pointer; margin-top:14px; text-decoration:underline;}
  .msg-box{font-family:'IBM Plex Mono',monospace; font-size:0.78rem; margin-top:14px; display:none;}
  .msg-box.err{color:var(--danger); display:block;}
  .msg-box.ok{color:var(--teal); display:block;}

  #dash{display:none; min-height:100vh; flex-direction:column;}
  header{border-bottom:1px solid var(--line); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-dot{width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px var(--amber);}
  .brand-name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:1.02rem;}
  .brand-sub{font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--paper-dim);}
  .logout-btn{background:none; border:1px solid var(--line); color:var(--paper-dim); font-family:'IBM Plex Mono',monospace; font-size:0.74rem; padding:8px 14px; border-radius:var(--radius); cursor:pointer;}
  .logout-btn:hover{border-color:var(--danger); color:var(--danger);}
  .tab-btn.active{border-color:var(--amber); color:var(--amber);}

  .dash-inner{max-width:800px; margin:0 auto; padding:40px 24px; width:100%;}

  .section-title{font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--paper-dim); margin-bottom:14px;}

  /* project cards */
  .project-card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:22px; margin-bottom:18px;}
  .project-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:14px; flex-wrap:wrap;}
  .project-order{font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--paper-dim);}
  .project-type{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.1rem; margin-top:2px;}
  .status-pill{font-family:'IBM Plex Mono',monospace; font-size:0.68rem; padding:4px 12px; border-radius:20px; white-space:nowrap;}
  .status-pill.pending{color:var(--amber); border:1px solid rgba(217,164,65,0.3); background:rgba(217,164,65,0.08);}
  .status-pill.replied{color:var(--teal); border:1px solid rgba(79,163,160,0.3); background:rgba(79,163,160,0.08);}

  .pay-row{display:flex; gap:20px; flex-wrap:wrap; margin:14px 0; padding:14px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line);}
  .pay-item{}
  .pay-label{font-family:'IBM Plex Mono',monospace; font-size:0.66rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--paper-dim); margin-bottom:4px;}
  .pay-value{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.05rem;}

  .changes-list{margin:14px 0;}
  .change-row{display:flex; justify-content:space-between; gap:10px; padding:8px 0; font-size:0.84rem; border-bottom:1px solid var(--line);}
  .change-date{color:var(--paper-dim); font-family:'IBM Plex Mono',monospace; font-size:0.7rem; margin-right:8px;}
  .change-pending-tag{font-family:'IBM Plex Mono',monospace; font-size:0.64rem; color:var(--amber); margin-left:6px;}

  .request-box{margin-top:14px;}
  .small-btn{background:var(--amber); color:var(--ink); border:none; border-radius:var(--radius); padding:9px 16px; font-family:'IBM Plex Mono',monospace; font-size:0.76rem; font-weight:600; cursor:pointer;}
  .empty-state{text-align:center; padding:50px 20px; color:var(--paper-dim); font-family:'IBM Plex Mono',monospace; font-size:0.84rem;}

  /* referral tab (reused) */
  .link-card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:24px; margin-bottom:32px;}
  .link-card-label{font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--paper-dim); margin-bottom:10px;}
  .link-row{display:flex; gap:10px; align-items:center;}
  .link-display{flex:1; background:var(--ink); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; font-family:'IBM Plex Mono',monospace; font-size:0.86rem; color:var(--teal); overflow-x:auto; white-space:nowrap;}
  .copy-btn{background:var(--amber); color:var(--ink); border:none; border-radius:var(--radius); padding:12px 18px; font-family:'IBM Plex Mono',monospace; font-size:0.78rem; font-weight:600; cursor:pointer; white-space:nowrap;}
  .stats-row{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:32px;}
  .stat-card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px;}
  .stat-label{font-family:'IBM Plex Mono',monospace; font-size:0.68rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--paper-dim); margin-bottom:8px;}
  .stat-value{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.5rem;}
  .stat-value.teal{color:var(--teal);}
  .stat-value.amber{color:var(--amber);}
  .ref-entry{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;}
  .name-setup{max-width:400px;}

  @media (max-width:600px){ .stats-row{grid-template-columns:1fr;} }
</style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen">
    <div class="auth-box">
      <div class="eyebrow mono">// Skyline Lab</div>
      <div class="auth-title">My Account</div>
      <div class="auth-sub">Sign in with your email to track your project, see payments, request changes — and if you've referred anyone, your earnings too. No password needed.</div>

      <div id="stepEmail">
        <label class="field-label">Email</label>
        <input type="email" class="field-input" id="emailInput" placeholder="you@gmail.com">
        <button class="primary-btn" onclick="sendOtp()" id="sendOtpBtn">Send login code →</button>
      </div>

      <div id="stepOtp" style="display:none;">
        <label class="field-label">Enter the 6-digit code sent to your email</label>
        <input type="text" class="field-input" id="otpInput" placeholder="123456" maxlength="6">
        <button class="primary-btn" onclick="verifyOtp()" id="verifyOtpBtn">Verify & sign in →</button>
        <button class="link-btn" onclick="backToEmail()">← Use a different email</button>
      </div>

      <div class="msg-box" id="authMsg"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash">
    <header>
      <div class="brand">
        <div class="brand-dot"></div>
        <div>
          <div class="brand-name">Skyline Lab</div>
          <div class="brand-sub">My account</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="logout-btn mono tab-btn active" id="tabProjectsBtn" onclick="switchTab('projects')">My Projects</button>
        <button class="logout-btn mono tab-btn" id="tabReferBtn" onclick="switchTab('refer')">Refer & Earn</button>
        <button class="logout-btn mono" onclick="logOut()">Log out</button>
      </div>
    </header>

    <div class="dash-inner">

      <!-- MY PROJECTS TAB -->
      <div id="projectsTab">
        <div id="projectsList"></div>
      </div>

      <!-- REFER & EARN TAB -->
      <div id="referTab" style="display:none;">
        <div id="nameSetup" style="display:none;" class="link-card name-setup">
          <div class="link-card-label">One last step</div>
          <label class="field-label">What should we call you?</label>
          <input type="text" class="field-input" id="nameInput" placeholder="Your name">
          <button class="primary-btn" onclick="createReferrerProfile()">Get my referral link →</button>
        </div>

        <div id="referContent" style="display:none;">
          <div class="link-card">
            <div class="link-card-label">Your referral link</div>
            <div class="link-row">
              <div class="link-display mono" id="refLinkDisplay"></div>
              <button class="copy-btn mono" onclick="copyLink()">Copy</button>
            </div>
          </div>
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-label mono">Clients referred</div>
              <div class="stat-value" id="statCount">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label mono">Total earned</div>
              <div class="stat-value teal" id="statEarned">₹0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label mono">Pending payout</div>
              <div class="stat-value amber" id="statPending">₹0</div>
            </div>
          </div>
          <div class="section-title mono">Your referrals</div>
          <div id="refList"></div>
        </div>
      </div>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = "https://ufksaccekypuohdosukm.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVma3NhY2Nla3lwdW9oZG9zdWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTc1OTQsImV4cCI6MjA5OTY5MzU5NH0.0vZJWUIFdnUlrCVT3QQDI9nZ7ETHvQzZgET956909ic";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const SITE_URL = "https://skylineorbitlab.github.io";

  let pendingEmail = "";

  // Pre-fill email if arriving from an "Accept / Track your project" email link
  window.addEventListener('DOMContentLoaded', () => {
    const prefill = new URLSearchParams(window.location.search).get('email');
    if (prefill) document.getElementById('emailInput').value = prefill;
  });

  async function sendOtp(){
    const email = document.getElementById('emailInput').value.trim();
    const msg = document.getElementById('authMsg');
    if (!email){ msg.textContent = "Enter your email"; msg.className = "msg-box err"; return; }

    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = true; btn.textContent = "Sending...";

    const { error } = await supabaseClient.auth.signInWithOtp({ email, options: { shouldCreateUser: true } });

    btn.disabled = false; btn.textContent = "Send login code →";

    if (error){ msg.textContent = error.message; msg.className = "msg-box err"; return; }
    pendingEmail = email;
    document.getElementById('stepEmail').style.display = 'none';
    document.getElementById('stepOtp').style.display = 'block';
    msg.textContent = "Code sent — check your inbox."; msg.className = "msg-box ok";
  }

  function backToEmail(){
    document.getElementById('stepEmail').style.display = 'block';
    document.getElementById('stepOtp').style.display = 'none';
    document.getElementById('authMsg').style.display = 'none';
  }

  async function verifyOtp(){
    const token = document.getElementById('otpInput').value.trim();
    const msg = document.getElementById('authMsg');
    if (!token){ msg.textContent = "Enter the code"; msg.className = "msg-box err"; return; }

    const btn = document.getElementById('verifyOtpBtn');
    btn.disabled = true; btn.textContent = "Verifying...";

    const { error } = await supabaseClient.auth.verifyOtp({ email: pendingEmail, token, type: 'email' });

    btn.disabled = false; btn.textContent = "Verify & sign in →";

    if (error){ msg.textContent = error.message; msg.className = "msg-box err"; return; }
    enterDashboard();
  }

  async function logOut(){
    await supabaseClient.auth.signOut();
    location.reload();
  }

  function switchTab(tab){
    document.getElementById('tabProjectsBtn').classList.toggle('active', tab === 'projects');
    document.getElementById('tabReferBtn').classList.toggle('active', tab === 'refer');
    document.getElementById('projectsTab').style.display = tab === 'projects' ? 'block' : 'none';
    document.getElementById('referTab').style.display = tab === 'refer' ? 'block' : 'none';
    if (tab === 'refer') loadReferralTab();
  }

  async function enterDashboard(){
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('dash').style.display = 'flex';

    // Link any past guest submissions made with this email to this account
    await supabaseClient.rpc('claim_my_messages');

    await loadProjects();
  }

  // ===== MY PROJECTS =====
  async function loadProjects(){
    const { data: { user } } = await supabaseClient.auth.getUser();
    const { data: projects, error } = await supabaseClient
      .from('messages')
      .select('*')
      .eq('client_id', user.id)
      .order('created_at', { ascending: false });

    if (error){ console.error(error); return; }

    const listEl = document.getElementById('projectsList');
    if (!projects || projects.length === 0){
      listEl.innerHTML = `<div class="empty-state">No projects linked to this account yet.</div>`;
      return;
    }

    const ids = projects.map(p => p.id);
    const { data: allChanges } = await supabaseClient
      .from('change_requests')
      .select('*')
      .in('message_id', ids)
      .order('created_at', { ascending: true });

    listEl.innerHTML = projects.map(p => {
      const changes = (allChanges || []).filter(c => c.message_id === p.id);
      const orderNo = "SKY-" + String(p.order_no || 0).padStart(6, '0');
      const statusLabel = p.replied ? 'Replied' : 'Pending reply';
      const statusClass = p.replied ? 'replied' : 'pending';

      const payRow = (p.total_amount || p.advance_received || p.final_received) ? `
        <div class="pay-row">
          ${p.total_amount ? `<div class="pay-item"><div class="pay-label mono">Total</div><div class="pay-value">₹${Number(p.total_amount).toLocaleString('en-IN')}</div></div>` : ''}
          ${p.advance_received ? `<div class="pay-item"><div class="pay-label mono">Advance paid</div><div class="pay-value" style="color:var(--teal);">₹${Number(p.advance_received).toLocaleString('en-IN')}</div></div>` : ''}
          ${p.final_received ? `<div class="pay-item"><div class="pay-label mono">Final paid</div><div class="pay-value" style="color:var(--teal);">₹${Number(p.final_received).toLocaleString('en-IN')}</div></div>` : ''}
          ${p.total_amount ? `<div class="pay-item"><div class="pay-label mono">Remaining</div><div class="pay-value" style="color:var(--amber);">₹${Math.max(Number(p.total_amount) - Number(p.advance_received||0) - Number(p.final_received||0), 0).toLocaleString('en-IN')}</div></div>` : ''}
        </div>
      ` : '';

      const changesHtml = changes.length > 0 ? `
        <div class="changes-list">
          <div class="pay-label mono" style="margin-bottom:8px;">Change history</div>
          ${changes.map(c => `
            <div class="change-row">
              <span><span class="change-date">${new Date(c.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>${c.description}${!c.amount && c.requested_by_client ? '<span class="change-pending-tag">awaiting review</span>' : ''}</span>
              ${c.amount ? `<span class="mono">₹${Number(c.amount).toLocaleString('en-IN')}</span>` : ''}
            </div>
          `).join('')}
        </div>
      ` : '';

      return `
        <div class="project-card">
          <div class="project-top">
            <div>
              <div class="project-order mono">${orderNo}</div>
              <div class="project-type">${p.project_type || 'Project'}</div>
            </div>
            <span class="status-pill ${statusClass} mono">${statusLabel}</span>
          </div>
          ${payRow}
          ${changesHtml}
          <div class="request-box">
            <textarea class="field-input" id="changeReq_${p.id}" placeholder="Need something changed or added? Describe it here..." style="margin-bottom:10px;"></textarea>
            <button class="small-btn" onclick="submitChangeRequest('${p.id}')">Submit request</button>
            <span class="mono" id="changeReqStatus_${p.id}" style="margin-left:10px; font-size:0.76rem; color:var(--teal);"></span>
          </div>
        </div>
      `;
    }).join('');
  }

  async function submitChangeRequest(messageId){
    const textEl = document.getElementById('changeReq_' + messageId);
    const text = textEl.value.trim();
    if (!text) return;
    const statusEl = document.getElementById('changeReqStatus_' + messageId);

    const { error } = await supabaseClient
      .from('change_requests')
      .insert([{ message_id: messageId, description: text, requested_by_client: true, amount: null }]);

    if (error){ statusEl.textContent = 'Failed — try again'; statusEl.style.color = 'var(--danger)'; console.error(error); return; }

    textEl.value = '';
    statusEl.textContent = 'Sent ✓';
    loadProjects();
  }

  // ===== REFER & EARN (same account) =====
  let referralLoaded = false;

  async function loadReferralTab(){
    if (referralLoaded) return;
    const { data: { user } } = await supabaseClient.auth.getUser();
    const { data: referrer } = await supabaseClient.from('referrers').select('*').eq('id', user.id).maybeSingle();

    if (!referrer){
      document.getElementById('nameSetup').style.display = 'block';
    } else {
      document.getElementById('referContent').style.display = 'block';
      loadReferralData(referrer);
      referralLoaded = true;
    }
  }

  function generateCode(name){
    const base = (name || 'REF').replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 6) || 'REF';
    const rand = Math.random().toString(36).slice(2, 6).toUpperCase();
    return base + rand;
  }

  async function createReferrerProfile(){
    const name = document.getElementById('nameInput').value.trim();
    if (!name) return;
    const { data: { user } } = await supabaseClient.auth.getUser();
    const code = generateCode(name);

    const { data, error } = await supabaseClient
      .from('referrers')
      .insert([{ id: user.id, name, referral_code: code }])
      .select()
      .single();

    if (error){ alert('Something went wrong, try again.'); console.error(error); return; }

    document.getElementById('nameSetup').style.display = 'none';
    document.getElementById('referContent').style.display = 'block';
    loadReferralData(data);
    referralLoaded = true;
  }

  async function loadReferralData(referrer){
    const link = `${SITE_URL}/?ref=${referrer.referral_code}`;
    document.getElementById('refLinkDisplay').textContent = link;
    window.currentRefLink = link;

    const { data: refs, error } = await supabaseClient
      .from('messages')
      .select('*')
      .eq('referrer_id', referrer.id)
      .order('created_at', { ascending: false });

    if (error){ console.error(error); return; }

    document.getElementById('statCount').textContent = refs.length;
    const totalEarned = refs.reduce((sum, r) => sum + (r.commission_paid ? Number(r.commission_amount || 0) : 0), 0);
    const totalPending = refs.reduce((sum, r) => sum + (!r.commission_paid ? Number(r.commission_amount || 0) : 0), 0);
    document.getElementById('statEarned').textContent = `₹${totalEarned.toLocaleString('en-IN')}`;
    document.getElementById('statPending').textContent = `₹${totalPending.toLocaleString('en-IN')}`;

    const listEl = document.getElementById('refList');
    if (refs.length === 0){
      listEl.innerHTML = `<div class="empty-state">No referrals yet — share your link above to get started.</div>`;
      return;
    }

    listEl.innerHTML = refs.map(r => {
      const hasCommission = Number(r.commission_amount || 0) > 0;
      const statusLabel = r.commission_paid ? 'Paid out' : (hasCommission ? 'Commission pending payout' : 'In progress');
      const date = new Date(r.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      return `
        <div class="ref-entry">
          <div>
            <div style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:0.94rem;">${r.from_name}</div>
            <div style="font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--paper-dim);">${date} · ${r.project_type || ''}</div>
          </div>
          <div style="display:flex; align-items:center; gap:12px;">
            <span class="status-pill ${r.commission_paid ? 'replied' : 'pending'} mono">${statusLabel}</span>
            <span class="mono" style="font-weight:600;">₹${Number(r.commission_amount || 0).toLocaleString('en-IN')}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function copyLink(){
    navigator.clipboard.writeText(window.currentRefLink);
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied ✓';
    setTimeout(()=>{ btn.textContent = 'Copy'; }, 1500);
  }

  // Resume session on reload
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) enterDashboard();
  })();
</script>
</body>
</html>
